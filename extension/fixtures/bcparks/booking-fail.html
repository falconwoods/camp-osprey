<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #f5f7fa;
    }

    main {
      max-width: 960px;
      margin: 48px auto;
      padding: 32px;
      background: #fff;
      border: 1px solid #d8dee8;
      border-radius: 4px;
    }

    .payment-header {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .page-number {
      display: inline-flex;
      width: 34px;
      height: 34px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #174a7c;
      color: #fff;
      font-weight: 700;
    }

    .alert-box.error-box {
      margin-bottom: 24px;
      padding: 16px;
      border-left: 5px solid #b42318;
      background: #fff3f0;
      color: #7a271a;
    }

    .alert-box-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .form-wrapper {
      display: grid;
      gap: 14px;
      max-width: 520px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #b8c1cc;
      border-radius: 3px;
    }

    button {
      margin-top: 16px;
      padding: 10px 14px;
    }
  </style>
</head>
<body>
  <main id="main" class="container app-background">
    <app-create-booking>
      <app-payment>
        <div class="payment-header">
          <div class="page-number active">7</div>
          <h1 id="pageTitle">Payment</h1>
        </div>

        <section class="booking-summary">
          <h2 id="payment-bookings-header">Your booking details</h2>
          <p>Alice Lake Provincial Park, Campsite 52, Tue, Jun 16 - Wed, Jun 17, 2026</p>
        </section>

        <div role="alert" aria-live="assertive" aria-atomic="true" class="alert-box error-box margin-bottom-20">
          <div class="alert-box-title">Payment was unsuccessful</div>
          <div>The payment was unsuccessful. Please try again.</div>
        </div>

        <form novalidate aria-labelledby="creditCardHeader securePayment" class="form-wrapper">
          <h3 id="cardInfoHeader">Cardholder Information</h3>
          <div>
            <label id="cardNumber-label" for="cardNumber">Card #</label>
            <input id="cardNumber" aria-labelledby="cardNumber-label" value="">
          </div>
          <div>
            <label id="cardHolderName-label" for="cardHolderName">Name on card</label>
            <input id="cardHolderName" aria-labelledby="cardHolderName-label" value="">
          </div>
          <div>
            <label id="cardExpiry-label" for="cardExpiry">Expiry date</label>
            <input id="cardExpiry" aria-labelledby="cardExpiry-label" value="">
          </div>
          <div>
            <label id="cardCvv-label" for="cardCvv">Security code</label>
            <input id="cardCvv" aria-labelledby="cardCvv-label" value="">
          </div>
          <button id="applyPaymentButton" type="submit" aria-label="Apply credit card payment, ">Apply payment</button>
        </form>
      </app-payment>
    </app-create-booking>
  </main>
</body>
</html>
