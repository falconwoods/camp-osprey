<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Success!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #f5f7fa;
    }

    main {
      max-width: 960px;
      margin: 48px auto;
      padding: 32px;
      background: #fff;
      border: 1px solid #d8dee8;
      border-radius: 4px;
    }

    .page-title-wrapper {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .success-icon {
      color: #2e7d32;
      font-size: 28px;
    }

    .container-border {
      display: flex;
      gap: 48px;
      border: 1px solid #d8dee8;
      padding: 24px;
    }

    .success-reference-number {
      margin-top: 18px;
      font-size: 20px;
      font-weight: 700;
    }

    .booking-buttons {
      min-width: 240px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .booking-buttons li {
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
    }
  </style>
</head>
<body>
  <main id="main" class="container app-background">
    <app-create-booking>
      <app-checkout-confirmation>
        <div class="page-title-wrapper">
          <fa-icon size="2x" aria-hidden="true" alt="" class="ng-fa-icon fa success-icon">✓</fa-icon>
          <h1 id="pageTitle">Success!</h1>
        </div>

        <div class="container-border">
          <section aria-labelledby="referenceNumber_1">
            <div id="confirmationMessage_1">
              You have successfully made a reservation for <strong>Campsite 18</strong>
              at <strong>Golden Ears</strong> on
              <strong>Sun August 30 - Mon August 31, 2026</strong>.
            </div>

            <div class="success-reference" id="referenceNumber_1">
              <p class="success-reference-number"> Reservation Number: BCIN123456B1 </p>
            </div>
          </section>

          <ul class="booking-buttons" id="optionButtons_1" aria-label="Reservation options">
            <li><button id="viewThisReservation_1">View this reservation</button></li>
            <li><button id="printConfirmationLetter_1">Print confirmation letter</button></li>
            <li><button>View payment receipt</button></li>
            <li><button id="reserveAgainButton_1">Reserve again</button></li>
          </ul>
        </div>
      </app-checkout-confirmation>
    </app-create-booking>
  </main>
</body>
</html>
