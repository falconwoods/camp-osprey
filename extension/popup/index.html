<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Theme variables ─────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:           #f8fafc;
      --bg-card:      #1e293b;
      --bg-input:     #0f172a;
      --bg-blue:      #1e3a5f;
      --bg-soft:      rgba(59,130,246,0.09);
      --border:       #334155;
      --text:         #e2e8f0;
      --text-muted:   #64748b;
      --text-subtle:  #94a3b8;
      --text-dim:     #475569;
      --green:        #22c55e;
      --green-subtle: rgba(34,197,94,0.13);
      --green-border: rgba(34,197,94,0.27);
      --blue:         #3b82f6;
      --amber:        #f59e0b;
      --amber-subtle: rgba(245,158,11,0.07);
      --amber-border: rgba(245,158,11,0.2);
      --red:          #ef4444;
    }
    [data-theme="light"] {
      --bg:           #f8fafc;
      --bg-card:      #ffffff;
      --bg-input:     #f1f5f9;
      --bg-blue:      #eff6ff;
      --bg-soft:      #f8fafc;
      --border:       #e2e8f0;
      --text:         #0f172a;
      --text-muted:   #64748b;
      --text-subtle:  #475569;
      --text-dim:     #334155;
      --green:        #16a34a;
      --green-subtle: rgba(22,163,74,0.1);
      --green-border: rgba(22,163,74,0.25);
      --blue:         #2563eb;
      --amber:        #b45309;
      --amber-subtle: rgba(180,83,9,0.08);
      --amber-border: rgba(180,83,9,0.2);
      --red:          #dc2626;
    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]):not([data-theme="light"]) {
        --bg:           #f8fafc;
        --bg-card:      #ffffff;
        --bg-input:     #f1f5f9;
        --bg-blue:      #eff6ff;
        --bg-soft:      #f8fafc;
        --border:       #e2e8f0;
        --text:         #0f172a;
        --text-muted:   #64748b;
        --text-subtle:  #475569;
        --text-dim:     #334155;
        --green:        #16a34a;
        --green-subtle: rgba(22,163,74,0.1);
        --green-border: rgba(22,163,74,0.25);
        --blue:         #2563eb;
        --amber:        #b45309;
        --amber-subtle: rgba(180,83,9,0.08);
        --amber-border: rgba(180,83,9,0.2);
        --red:          #dc2626;
      }
    }

    /* ── Layout ──────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 372px; min-height: 200px; background: #f8fafc; color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; padding: 10px; }
    .header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 14px; background: #fff; padding: 10px 12px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.07); }
    .header-brand { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .header-icon { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; flex: 0 0 auto; border-radius: 11px; background: #ecfdf5; font-size: 20px; }
    .header-copy { min-width: 0; }
    .header-title { display: block; color: #020617; font-weight: 750; font-size: 17px; line-height: 1.1; letter-spacing: 0; }
    .header-email { display: block; margin-top: 2px; color: #64748b; font-size: 11px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 190px; }
    .header-settings { display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; color: #475569; cursor: pointer; text-decoration: none; font-size: 12px; font-weight: 600; border-radius: 999px; padding: 6px 8px; }
    .header-settings:hover { background: #f8fafc; }
    .icon { display: inline-block; width: 16px; height: 16px; vertical-align: -3px; }

    /* ── Trip cards ──────────────────────────────────────────── */
    #trips-container { display: grid; gap: 9px; }
    .trip-card { background: #fff; border-radius: 14px; padding: 12px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.07); }
    .trip-card.scanning  { border-color: #bbf7d0; box-shadow: 0 0 0 1px #d1fae5, 0 1px 2px rgba(15, 23, 42, 0.07); }
    .trip-card.reserving { border-color: #bfdbfe; }
    .trip-card.reserved,
    .trip-card.paid      { border-color: #e2e8f0; }
    .trip-card.paused    { border-color: #fde68a; }
    .trip-card.failed    { border-color: #fecaca; }
    .trip-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 0; }
    .trip-main { min-width: 0; flex: 1; }
    .trip-title-line { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .trip-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #020617; font-weight: 700; font-size: 16px; line-height: 1.25; letter-spacing: 0; }
    .trip-summary { margin-top: 3px; color: #64748b; font-size: 12px; line-height: 1.35; }
    .trip-more { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; flex: 0 0 auto; border: 0; border-radius: 999px; background: transparent; color: #64748b; cursor: default; }
    .trip-actions { display: flex; gap: 7px; align-items: center; margin-top: 10px; }
    .trip-actions a { display: flex; flex: 1 1 auto; min-width: 0; }
    .trip-actions .btn-reserve { flex: 1 1 auto; }
    .trip-actions .btn-start,
    .trip-actions .btn-stop { flex: 0 0 auto; }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; padding: 4px 8px; border: 1px solid; border-radius: 999px; font-size: 12px; font-weight: 600; line-height: 1.1; white-space: nowrap; }
    .badge-scanning,
    .badge-reserved,
    .badge-paid { background: #ecfdf5; border-color: #bbf7d0; color: #047857; }
    .badge-reserving { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
    .badge-paused    { background: #fffbeb; border-color: #fde68a; color: #b45309; }
    .badge-failed    { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
    .badge-idle      { background: #f8fafc; border-color: #e2e8f0; color: #64748b; }
    .status-dot { width: 8px; height: 8px; border-radius: 999px; background: currentColor; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; min-height: 34px; padding: 0 12px; border-radius: 11px; font-size: 13px; line-height: 1.2; font-weight: 650; cursor: pointer; box-shadow: none; white-space: nowrap; }
    .btn-stop    { background: #fff; color: #0f172a; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.12), 0 2px 10px rgba(15, 23, 42, 0.08); }
    .btn-start   { background: #f1f5f9; color: #047857; }
    .btn:disabled { cursor: default; opacity: 0.65; }
    .btn-reserve { width: 100%; background: #059669; color: #fff; font-weight: 700; }
    .add-trip { width: 100%; background: #fff; border: 1px dashed #cbd5e1; color: #334155; padding: 10px; border-radius: 13px; font-size: 13px; font-weight: 650; cursor: pointer; margin-top: 10px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.07); }
    .account-cta { display: flex; justify-content: space-between; align-items: center; gap: 8px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 10px; font-size: 11px; color: #64748b; margin-bottom: 9px; line-height: 1.35; }
    .account-cta strong { color: var(--text); font-weight: 600; }
    .account-email { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .auth-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: 11px; margin-bottom: 6px; }

    /* ── Match banner ────────────────────────────────────────── */
    .match-found,
    .match-booked,
    .match-panel { background: #ecfdf5; border: 1px solid #bbf7d0; border-radius: 12px; padding: 9px 10px; margin-top: 10px; font-size: 12px; line-height: 1.35; color: #065f46; }
    .match-title { color: #065f46; font-weight: 700; }
    .match-subtitle { margin-top: 4px; color: #065f46; }
    .state-panel { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; border-radius: 12px; padding: 9px 10px; background: #f8fafc; }
    .state-panel.scanning { background: #f8fafc; }
    .state-panel.reserving { background: #eff6ff; color: #1d4ed8; }
    .state-panel.paused { background: #fffbeb; color: #92400e; }
    .state-panel.failed { background: #fef2f2; color: #b91c1c; }
    .state-panel.idle { background: #f8fafc; }
    .state-title { color: #1e293b; font-size: 13px; font-weight: 650; line-height: 1.25; }
    .state-panel.reserving .state-title { color: #1d4ed8; }
    .state-panel.paused .state-title { color: #92400e; }
    .state-panel.failed .state-title { color: #b91c1c; }
    .state-subtitle { margin-top: 2px; color: #64748b; font-size: 11px; line-height: 1.25; }

    /* ── Alerts ──────────────────────────────────────────────── */
    .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 7px 9px; font-size: 11px; color: var(--red); margin: 8px 0 0; line-height: 1.4; }
    .alert-warn  { background: var(--amber-subtle); border: 1px solid var(--amber-border); border-radius: 10px; padding: 7px 9px; font-size: 11px; color: var(--amber); margin: 8px 0 0; line-height: 1.4; }
    .alert-error a, .alert-warn a { color: inherit; }
    #global-alerts:empty { display: none; }
    .empty { text-align: center; color: #64748b; padding: 24px 0; font-size: 14px; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <span class="header-icon">🏕</span>
      <span class="header-copy">
        <span class="header-title">CampOsprey</span>
        <span class="header-email" id="header-email"></span>
      </span>
    </div>
    <a class="header-settings" id="settings-link" href="#">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.28 7.28 0 0 0-1.69-.98L14.5 2.42A.5.5 0 0 0 14 2h-4a.5.5 0 0 0-.5.42L9.12 5.07c-.61.24-1.18.56-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98s.02.66.07.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .6.22l2.49-1c.51.41 1.08.74 1.69.98l.38 2.65a.5.5 0 0 0 .5.42h4a.5.5 0 0 0 .5-.42l.38-2.65c.61-.24 1.18-.56 1.69-.98l2.49 1a.5.5 0 0 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65Z"/></svg>
      Settings
    </a>
  </div>
  <div id="global-alerts"></div>
  <div id="trips-container"></div>
  <button class="add-trip" id="add-trip-btn">Manage Trip</button>
  <script type="module" src="../src/popup/index.ts"></script>
</body>
</html>
