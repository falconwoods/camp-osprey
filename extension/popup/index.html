<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles/theme.css">
  <style>
    /* ── Layout ──────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 372px; min-height: 200px; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; padding: 10px; }
    .header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface-glass); padding: 10px 12px; box-shadow: var(--shadow); }
    .header-brand { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .header-icon { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; flex: 0 0 auto; border-radius: 11px; background: var(--green-subtle); font-size: 20px; }
    .header-copy { min-width: 0; }
    .header-title { display: block; color: var(--text); font-weight: 750; font-size: 17px; line-height: 1.1; letter-spacing: 0; }
    .header-email { display: block; margin-top: 2px; color: var(--text-muted); font-size: 11px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 190px; }
    .header-settings { display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; color: var(--text-subtle); cursor: pointer; text-decoration: none; font-size: 12px; font-weight: 600; border-radius: 999px; padding: 6px 8px; }
    .header-settings:hover { background: var(--bg-input); }
    .icon { display: inline-block; width: 16px; height: 16px; vertical-align: -3px; }

    /* ── Trip cards ──────────────────────────────────────────── */
    #trips-container { display: grid; gap: 9px; }
    .trip-card { background: var(--bg-card); border-radius: 14px; padding: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .trip-card.scanning  { border-color: var(--green-border); box-shadow: 0 0 0 1px var(--green-border), var(--shadow); }
    .trip-card.reserving { border-color: rgba(125,183,215,0.42); }
    .trip-card.reserved,
    .trip-card.paid      { border-color: var(--border); }
    .trip-card.paused    { border-color: var(--amber-border); }
    .trip-card.failed    { border-color: var(--red-border); }
    .trip-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 0; }
    .trip-main { min-width: 0; flex: 1; }
    .trip-title-line { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .trip-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); font-weight: 700; font-size: 16px; line-height: 1.25; letter-spacing: 0; }
    .trip-summary { margin-top: 3px; color: var(--text-muted); font-size: 12px; line-height: 1.35; }
    .trip-more { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; flex: 0 0 auto; border: 0; border-radius: 999px; background: transparent; color: var(--text-muted); cursor: default; }
    .trip-actions { display: flex; gap: 7px; align-items: center; margin-top: 10px; }
    .trip-actions a { display: flex; flex: 1 1 auto; min-width: 0; }
    .trip-card .btn { font-weight: 400; }
    .trip-actions .btn-reserve { flex: 1 1 auto; }
    .trip-actions .btn-start,
    .trip-actions .btn-stop { flex: 0 0 auto; }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; padding: 4px 8px; border: 1px solid; border-radius: 999px; font-size: 12px; font-weight: 600; line-height: 1.1; white-space: nowrap; }
    .badge-scanning,
    .badge-reserved,
    .badge-paid { background: var(--green-subtle); border-color: var(--green-border); color: var(--green); }
    .badge-reserving { background: var(--bg-blue); border-color: rgba(125,183,215,0.32); color: var(--blue); }
    .badge-paused    { background: var(--amber-subtle); border-color: var(--amber-border); color: var(--amber); }
    .badge-failed    { background: var(--red-subtle); border-color: var(--red-border); color: var(--red); }
    .badge-idle      { background: var(--bg-input); border-color: var(--border); color: var(--text-muted); }
    .status-dot { width: 8px; height: 8px; border-radius: 999px; background: currentColor; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; min-height: 34px; padding: 0 12px; border-radius: 11px; font-size: 13px; line-height: 1.2; font-weight: 650; cursor: pointer; box-shadow: none; white-space: nowrap; }
    .btn-stop    { background: var(--surface-glass); color: var(--text); box-shadow: var(--shadow); }
    .btn-start   { background: var(--green-subtle); color: var(--green); }
    .btn:disabled { cursor: default; opacity: 0.65; }
    .btn-reserve { width: 100%; background: var(--green); color: var(--on-green); font-weight: 700; }
    .add-trip { width: 100%; background: var(--surface-glass); border: 1px dashed var(--border); color: var(--text-subtle); padding: 10px; border-radius: 13px; font-size: 13px; font-weight: 650; cursor: pointer; margin-top: 10px; box-shadow: var(--shadow); }
    .account-cta { display: flex; justify-content: space-between; align-items: center; gap: 8px; background: var(--surface-glass); border: 1px solid var(--border); border-radius: 12px; padding: 8px 10px; font-size: 11px; color: var(--text-muted); margin-bottom: 9px; line-height: 1.35; }
    .account-cta strong { color: var(--text); font-weight: 600; }
    .account-email { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .auth-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: 11px; margin-bottom: 6px; }

    /* ── Match banner ────────────────────────────────────────── */
    .match-found,
    .match-booked,
    .match-panel { background: var(--green-subtle); border: 1px solid var(--green-border); border-radius: 12px; padding: 9px 10px; margin-top: 10px; font-size: 12px; line-height: 1.35; color: var(--green); }
    .match-title { color: var(--green); font-weight: 700; }
    .match-subtitle { margin-top: 4px; color: var(--green); }
    .state-panel { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; border-radius: 12px; padding: 9px 10px; background: var(--bg-input); }
    .state-panel.scanning { background: var(--bg-input); }
    .state-panel.reserving { background: var(--bg-blue); color: var(--blue); }
    .state-panel.paused { background: var(--amber-subtle); color: var(--amber); }
    .state-panel.failed { background: var(--red-subtle); color: var(--red); }
    .state-panel.idle { background: var(--bg-input); }
    .state-title { color: var(--text); font-size: 13px; font-weight: 650; line-height: 1.25; }
    .state-panel.reserving .state-title { color: var(--blue); }
    .state-panel.paused .state-title { color: var(--amber); }
    .state-panel.failed .state-title { color: var(--red); }
    .state-subtitle { margin-top: 2px; color: var(--text-muted); font-size: 11px; line-height: 1.25; }

    /* ── Alerts ──────────────────────────────────────────────── */
    .alert-error,
    .alert-warn {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      border: 1px solid;
      border-radius: 10px;
      padding: 8px 9px;
      font-size: 11px;
      margin: 8px 0 0;
      line-height: 1.35;
    }
    .alert-error { background: var(--red-subtle); border-color: var(--red-border); color: var(--red); }
    .alert-warn  { background: var(--amber-subtle); border-color: var(--amber-border); color: var(--amber); }
    .alert-has-action {
      align-items: center;
      padding: 10px;
      border-radius: 12px;
      box-shadow: inset 3px 0 0 currentColor, var(--shadow);
    }
    .alert-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      border-radius: 999px;
      color: var(--bg-card);
      font-size: 13px;
      font-weight: 850;
      line-height: 1;
    }
    .alert-error .alert-icon { background: var(--red); }
    .alert-warn .alert-icon { background: var(--amber); }
    .alert-copy { display: grid; gap: 2px; flex: 1 1 auto; min-width: 0; }
    .alert-copy strong { color: var(--text); font-size: 12px; font-weight: 800; line-height: 1.2; }
    .alert-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 9px;
      background: var(--green);
      color: var(--on-green);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      text-decoration: none;
    }
    #global-alerts:not(:empty) { margin-bottom: 9px; }
    #global-alerts:empty { display: none; }
    .empty { text-align: center; color: var(--text-muted); padding: 24px 0; font-size: 14px; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <span class="header-icon">🏕</span>
      <span class="header-copy">
        <span class="header-title">campsoon</span>
        <span class="header-email" id="header-email"></span>
      </span>
    </div>
    <a class="header-settings" id="settings-link" href="#">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.28 7.28 0 0 0-1.69-.98L14.5 2.42A.5.5 0 0 0 14 2h-4a.5.5 0 0 0-.5.42L9.12 5.07c-.61.24-1.18.56-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98s.02.66.07.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .6.22l2.49-1c.51.41 1.08.74 1.69.98l.38 2.65a.5.5 0 0 0 .5.42h4a.5.5 0 0 0 .5-.42l.38-2.65c.61-.24 1.18-.56 1.69-.98l2.49 1a.5.5 0 0 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65Z"/></svg>
      Settings
    </a>
  </div>
  <div id="global-alerts"></div>
  <div id="trips-container"></div>
  <button class="add-trip" id="add-trip-btn">Manage Trip</button>
  <script type="module" src="../src/popup/index.ts"></script>
</body>
</html>
