<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Theme variables ─────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:           #0f172a;
      --bg-card:      #1e293b;
      --bg-input:     #0f172a;
      --bg-blue:      #1e3a5f;
      --border:       #334155;
      --text:         #e2e8f0;
      --text-muted:   #64748b;
      --text-subtle:  #94a3b8;
      --text-dim:     #475569;
      --green:        #22c55e;
      --green-subtle: rgba(34,197,94,0.13);
      --green-border: rgba(34,197,94,0.27);
      --blue:         #3b82f6;
      --amber:        #f59e0b;
      --amber-subtle: rgba(245,158,11,0.07);
      --amber-border: rgba(245,158,11,0.2);
      --red:          #ef4444;
    }
    [data-theme="light"] {
      --bg:           #f8fafc;
      --bg-card:      #ffffff;
      --bg-input:     #f1f5f9;
      --bg-blue:      #eff6ff;
      --border:       #e2e8f0;
      --text:         #0f172a;
      --text-muted:   #64748b;
      --text-subtle:  #475569;
      --text-dim:     #334155;
      --green:        #16a34a;
      --green-subtle: rgba(22,163,74,0.1);
      --green-border: rgba(22,163,74,0.25);
      --blue:         #2563eb;
      --amber:        #b45309;
      --amber-subtle: rgba(180,83,9,0.08);
      --amber-border: rgba(180,83,9,0.2);
      --red:          #dc2626;
    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]):not([data-theme="light"]) {
        --bg:           #f8fafc;
        --bg-card:      #ffffff;
        --bg-input:     #f1f5f9;
        --bg-blue:      #eff6ff;
        --border:       #e2e8f0;
        --text:         #0f172a;
        --text-muted:   #64748b;
        --text-subtle:  #475569;
        --text-dim:     #334155;
        --green:        #16a34a;
        --green-subtle: rgba(22,163,74,0.1);
        --green-border: rgba(22,163,74,0.25);
        --blue:         #2563eb;
        --amber:        #b45309;
        --amber-subtle: rgba(180,83,9,0.08);
        --amber-border: rgba(180,83,9,0.2);
        --red:          #dc2626;
      }
    }

    /* ── Layout ──────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; min-height: 200px; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 12px; padding: 14px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .header-title { font-weight: 700; font-size: 14px; flex: 1; }
    .header-settings { color: var(--text-muted); cursor: pointer; text-decoration: none; font-size: 11px; }

    /* ── Trip cards ──────────────────────────────────────────── */
    .trip-card { background: var(--bg-card); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid var(--border); }
    .trip-card.scanning  { border-left-color: var(--green); }
    .trip-card.reserving { border-left-color: var(--blue); }
    .trip-card.reserved  { border-left-color: var(--green); }
    .trip-card.paid      { border-left-color: var(--green); opacity: 0.9; }
    .trip-card.paused    { border-left-color: var(--amber); opacity: 0.9; }
    .trip-card.failed    { border-left-color: #ef4444; }
    .trip-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .trip-name { font-weight: 600; font-size: 12px; }
    .trip-summary { color: var(--text-muted); font-size: 10px; line-height: 1.6; }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge { padding: 2px 7px; border-radius: 10px; font-size: 10px; }
    .badge-scanning  { background: var(--green-subtle); color: var(--green); }
    .badge-reserving { background: var(--bg-blue); color: var(--blue); }
    .badge-reserved  { background: var(--green-subtle); color: var(--green); }
    .badge-paid      { background: var(--green-subtle); color: var(--green); }
    .badge-paused    { background: var(--amber-subtle); color: var(--amber); }
    .badge-failed    { background: rgba(239,68,68,0.12); color: #ef4444; }
    .badge-idle      { background: var(--bg-blue); color: var(--text-muted); }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn { border: none; padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; margin-top: 6px; }
    .btn-stop    { background: var(--bg-blue); color: var(--text-muted); }
    .btn-start   { background: var(--bg-blue); color: var(--green); }
    .btn:disabled { cursor: default; opacity: 0.65; }
    .btn-reserve { background: var(--green); color: #fff; font-weight: 600; }
    .add-trip { width: 100%; background: var(--bg-blue); border: 1px dashed var(--blue); color: var(--blue); padding: 7px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-top: 4px; }
    .auth-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: 11px; margin-bottom: 6px; }

    /* ── Match banner ────────────────────────────────────────── */
    .match-found    { background: var(--green-subtle); border: 1px solid var(--green-border); border-radius: 5px; padding: 6px 8px; margin-top: 6px; font-size: 10px; color: var(--green); }
    .match-booked   { background: var(--green-subtle); border: 1px solid var(--green-border); border-radius: 5px; padding: 6px 8px; margin-top: 6px; font-size: 10px; color: var(--green); }

    /* ── Alerts ──────────────────────────────────────────────── */
    .alert-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 5px; padding: 6px 9px; font-size: 10px; color: var(--red); margin-bottom: 6px; line-height: 1.5; }
    .alert-warn  { background: var(--amber-subtle); border: 1px solid var(--amber-border); border-radius: 5px; padding: 6px 9px; font-size: 10px; color: var(--amber); margin-bottom: 6px; line-height: 1.5; }
    .alert-error a, .alert-warn a { color: inherit; }
    #global-alerts:empty { display: none; }
    .empty { text-align: center; color: var(--text-muted); padding: 20px 0; font-size: 11px; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:18px">🏕</span>
    <span class="header-title">CampOsprey</span>
    <a class="header-settings" id="settings-link" href="#">Settings ›</a>
  </div>
  <div id="global-alerts"></div>
  <div id="trips-container"></div>
  <button class="add-trip" id="add-trip-btn">+ New Trip</button>
  <script type="module" src="../src/popup/index.ts"></script>
</body>
</html>
